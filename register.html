<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini LMS - Register</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box glass-panel">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join Mini LMS today</p>
            </div>
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label for="role">I am a</label>
                    <select id="role" required>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
                <div id="errorMessage" class="error-text" style="display: none;"></div>
                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                    <span class="btn-text">Sign Up</span>
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="accent">Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorEl = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('registerBtn');

            errorEl.style.display = 'none';
            submitBtn.classList.add('loading');

            try {
                const response = await api.register(name, email, password, role);
                localStorage.setItem('token', response.token);
                localStorage.setItem('user', JSON.stringify(response));
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
            } finally {
                submitBtn.classList.remove('loading');
            }
        });
    </script>
</body>

</html>
